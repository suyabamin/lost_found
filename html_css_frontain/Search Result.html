<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Search Results | Lost & Found Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="Search Result.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="Landing Page.html">
        <i class="fa-solid fa-search-location"></i>
        <span>Lost<span class="highlight">Found</span></span>
      </a>
      <nav class="nav-list">
        <a href="DashBoard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="Browse Listing.html"><i class="fas fa-table-list"></i> Browse Listings</a>
        <a class="active" href="Search Result.html"><i class="fas fa-search"></i> Search</a>
        <a href="Notification.html"><i class="fas fa-bell"></i> Notifications</a>
        <a href="Profile Page.html"><i class="fas fa-user-circle"></i> Profile</a>
      </nav>
      <div class="sidebar-footer">
        <div class="ai-status">
          <i class="fas fa-microchip"></i>
          <span>AI Smart Search</span>
          <div class="pulse-dot"></div>
        </div>
      </div>
    </aside>

    <main class="content">
      <header class="topline">
        <div>
          <p class="eyebrow"><i class="fas fa-chart-simple"></i> Search Intelligence</p>
          <h1>Search Results</h1>
        </div>
        <div class="result-stats" id="resultStats">
          <span class="stat-badge"><i class="fas fa-database"></i> <span id="resultCount">0</span> results found</span>
        </div>
      </header>

      <!-- Advanced Search Panel -->
      <div class="search-panel-wrapper">
        <form class="search-panel" id="searchForm">
          <div class="search-input-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input class="search-input" type="search" id="searchQuery" placeholder="Search by title, category, location..." value="phone near campus">
            <button type="button" class="clear-search" id="clearSearchBtn"><i class="fas fa-times"></i></button>
          </div>
          <div class="filter-group">
            <select id="categoryFilter" class="filter-select">
              <option value="all">All Categories</option>
              <option value="electronics">Electronics</option>
              <option value="bag">Bags & Wallets</option>
              <option value="pets">Pets</option>
              <option value="jewelry">Jewelry</option>
              <option value="documents">Documents</option>
              <option value="keys">Keys</option>
            </select>
            <select id="statusFilter" class="filter-select">
              <option value="all">All Status</option>
              <option value="lost">Lost</option>
              <option value="found">Found</option>
            </select>
            <select id="sortBy" class="filter-select">
              <option value="relevance">Relevance</option>
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
            </select>
          </div>
          <button class="btn primary" type="submit" id="searchBtn">
            <i class="fa-solid fa-magnifying-glass"></i> Search
          </button>
        </form>
      </div>

      <!-- Filter Chips -->
      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-chip="all">All Results</button>
        <button class="chip" data-chip="lost">Lost Items</button>
        <button class="chip" data-chip="found">Found Items</button>
        <button class="chip" data-chip="nearby">Nearby</button>
        <button class="chip" data-chip="ai-match">AI Match</button>
      </div>

      <!-- Results Section -->
      <div class="results-header">
        <h3><i class="fas fa-list-ul"></i> Matching Listings</h3>
        <div class="view-toggle">
          <button class="view-btn active" data-view="grid"><i class="fas fa-grid-2"></i></button>
          <button class="view-btn" data-view="list"><i class="fas fa-bars"></i></button>
        </div>
      </div>

      <div class="results-grid" id="resultsGrid">
        <!-- Results will be dynamically inserted -->
      </div>

      <!-- Load More Section -->
      <div class="load-more-container" id="loadMoreContainer" style="display: none;">
        <button class="load-more-btn" id="loadMoreBtn">
          <i class="fas fa-sync-alt"></i> Load More Results
        </button>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <i class="fas fa-search-slash"></i>
        <h3>No results found</h3>
        <p>Try adjusting your search terms or filters to find what you're looking for.</p>
        <button class="btn-outline" id="resetFiltersBtn"><i class="fas fa-undo-alt"></i> Reset Filters</button>
      </div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="Search Result.js"></script>
  <script src="js/lf-core.js"></script>
  <script src="js/lf-ui.js"></script>
</body>
</html>
