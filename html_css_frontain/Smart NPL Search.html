<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Smart NLP Search | Lost & Found Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="Smart NPL Search.css">
</head>
<body>
  <div class="app-bg" aria-hidden="true">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>

  <main class="app-shell" aria-label="Smart NLP search web app">
    <header class="top-bar">
      <a class="brand" href="#" aria-label="Smart input home">
        <div class="brand-icon">
          <i class="fas fa-brain"></i>
        </div>
        <span>Smart<span class="highlight">Search</span></span>
        <span class="beta-badge">AI</span>
      </a>

      <nav class="top-nav" aria-label="Primary navigation">
        <a href="DashBoard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="Browse Listing.html"><i class="fas fa-search"></i> Lost Items</a>
        <a href="Browse Listing.html"><i class="fas fa-hand-holding-heart"></i> Found Items</a>
        <a href="Notification.html"><i class="fas fa-bell"></i> Alerts</a>
      </nav>

      <div class="user-menu">
        <div class="avatar">
          <i class="fas fa-user-circle"></i>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="hero-badge">
        <i class="fas fa-microchip"></i> NLP Powered
      </div>
      <h1>Smart Input Area</h1>
      <p class="subcopy">Describe what you lost or found in natural language — our AI will find matching posts instantly.</p>
    </section>

    <section class="search-panel" aria-label="Search input panel">
      <div class="search-container">
        <form class="smart-input" id="searchForm" autocomplete="off">
          <div class="input-wrapper">
            <i class="fas fa-search input-icon"></i>
            <input
              id="smartQuery"
              name="q"
              type="text"
              placeholder="e.g., I lost my black wallet near the campus library"
              autocomplete="off"
            >
            <button class="clear-input" type="button" id="clearInputBtn" style="display: none;">
              <i class="fas fa-times-circle"></i>
            </button>
          </div>

          <div class="action-buttons">
            <button class="mic-btn" type="button" id="voiceBtn" aria-label="Use voice input">
              <i class="fas fa-microphone"></i>
              <span class="mic-tooltip">Voice Search</span>
            </button>
            <button class="action-btn" type="submit" id="searchBtn" aria-label="Submit input">
              <i class="fas fa-arrow-right"></i>
            </button>
          </div>
        </form>

        <div class="voice-status" id="voiceStatus" style="display: none;">
          <div class="voice-wave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <span class="voice-text">Listening...</span>
        </div>

        <div class="quick-tags" aria-label="Quick prompts">
          <p class="quick-label"><i class="fas fa-bolt"></i> Quick examples:</p>
          <button type="button" data-query="lost wallet near coffee shop">💼 Lost wallet near coffee shop</button>
          <button type="button" data-query="found iphone in bus">📱 Found iPhone in bus</button>
          <button type="button" data-query="missing cat with orange fur">🐱 Missing cat with orange fur</button>
          <button type="button" data-query="black backpack left in library">🎒 Black backpack left in library</button>
        </div>

        <div class="result-hint" id="resultHint">
          <span class="live-dot"></span>
          <span id="aiStatusText">AI search ready</span>
        </div>
      </div>

      <!-- Search Results Section -->
      <div class="results-section" id="resultsSection" style="display: none;">
        <div class="results-header">
          <h3><i class="fas fa-chart-line"></i> AI-Powered Matches</h3>
          <div class="results-count" id="resultsCount"></div>
        </div>
        <div class="results-grid" id="resultsGrid"></div>
      </div>
    </section>
  </main>

  <!-- Toast Notification -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/lf-core.js"></script>
  <script src="js/lf-ui.js"></script>
  <script src="Smart NPL Search.js"></script>
</body>
</html>
